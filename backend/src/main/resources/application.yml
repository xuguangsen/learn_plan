server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always

spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://127.0.0.1:3306/go_todo?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:1234}
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: always

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5500,http://127.0.0.1:5500,http://localhost:5173,http://127.0.0.1:5173,http://localhost:63342,http://127.0.0.1:63342}
  jwt:
    secret: ${APP_JWT_SECRET:go-todo-demo-secret-key-for-hs256-please-change-1234567890}
    expiration-hours: ${APP_JWT_EXPIRATION_HOURS:72}
